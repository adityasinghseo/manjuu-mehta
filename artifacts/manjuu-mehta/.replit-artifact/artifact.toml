kind = "web"
previewPath = "/"
title = "Manjuu Mehta – Astrology, Numerology & Vastu"
version = "1.0.0"
id = "artifacts/manjuu-mehta"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20734

[services.development]
run = "pnpm --filter @workspace/manjuu-mehta run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manjuu-mehta", "run", "build" ]
publicDir = "artifacts/manjuu-mehta/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20734"
BASE_PATH = "/"
